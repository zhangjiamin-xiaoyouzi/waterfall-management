<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美柚广告系统 - ADX流量工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com.cn/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:#F2F2F5;color:#1D2129;overflow:hidden;height:100vh}
.layout{display:flex;height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #E5E6EB;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px 20px;border-bottom:1px solid #E5E6EB;font-size:14px;font-weight:600;color:#1D2129;display:flex;align-items:center;gap:8px}
.sidebar-menu{padding:8px 0;flex:1}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:10px 20px;cursor:pointer;font-size:14px;color:#4E5969;transition:all .15s;border-right:3px solid transparent}
.sidebar-item:hover{background:#FFF0F5;color:#FF4D88}
.sidebar-item.active{background:#FFF0F5;color:#FF4D88;border-right-color:#FF4D88;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{display:flex;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #E5E6EB;gap:12px;flex-shrink:0}
.breadcrumb{font-size:14px;color:#86909C}
.breadcrumb span{color:#1D2129;font-weight:500}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.scene-tabs{display:flex;gap:4px;background:#F2F2F5;padding:2px;border-radius:8px}
.scene-tab{padding:6px 16px;cursor:pointer;border-radius:6px;font-size:13px;color:#4E5969;transition:all .15s}
.scene-tab.active{background:#fff;color:#1D2129;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.platform-tabs{display:flex;gap:0;background:#F2F2F5;border-radius:4px;overflow:hidden}
.platform-tab{padding:4px 12px;cursor:pointer;font-size:12px;color:#4E5969;transition:all .15s}
.platform-tab.active{background:#FF4D88;color:#fff}
.group-tabs{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.group-tab{padding:6px 14px;cursor:pointer;font-size:13px;border-radius:6px;color:#4E5969;border:1px solid #E5E6EB;transition:all .15s}
.group-tab.active{background:#FF4D88;color:#fff;border-color:#FF4D88}
.group-tab .close-btn{margin-left:6px;font-size:12px;opacity:.5;cursor:pointer}
.group-tab .close-btn:hover{opacity:1}
.btn-primary{background:#FF4D88;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary:hover{background:#E8437A}
.btn-secondary{background:#fff;color:#1D2129;border:1px solid #E5E6EB;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.btn-secondary:hover{background:#F7F8FA}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#F7F8FA;position:sticky;top:0;z-index:1}
th{padding:10px 8px;text-align:left;font-weight:500;color:#4E5969;border-bottom:1px solid #E5E6EB;white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid #F2F3F5;vertical-align:middle;color:#4E5969}
tr:hover{background:#F7F8FA}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:#1D2129}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #D9DADE;border-radius:6px;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#FF4D88}
.form-group .display-field{padding:8px 12px;background:#F7F8FA;border-radius:6px;font-size:13px;color:#4E5969}
.info-icon{display:inline-flex;width:14px;height:14px;border-radius:50%;background:#C9CDD4;color:#fff;font-size:10px;align-items:center;justify-content:center;cursor:help;margin-left:4px;vertical-align:middle;position:relative}
.info-icon:hover .tooltip{display:block}
.tooltip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1D2129;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:100}
.badge-bidding{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;background:#E8F3FF;color:#165DFF}
.badge-price{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;background:#E8FFE8;color:#00A870}
.hover-card{position:fixed;z-index:100;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:16px;min-width:240px;display:none}
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0}
.pagination button{padding:4px 10px;border:1px solid #E5E6EB;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;color:#4E5969}
.pagination button.active{background:#FF4D88;color:#fff;border-color:#FF4D88}
.pagination button:disabled{opacity:.4;cursor:default}
.switch{position:relative;display:inline-block;width:36px;height:20px;cursor:pointer}
.switch input{display:none}
.switch .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#C9CDD4;border-radius:10px;transition:.2s}
.switch input:checked+.slider{background:#165DFF}
.switch .slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.slider:before{transform:translateX(16px)}
.tag{display:inline-block;padding:0 4px;border-radius:3px;font-size:11px;margin-left:4px}
.tag-default{background:#FFF0F5;color:#FF4D88}
.tag-ab-testing{background:#E8F3FF;color:#165DFF}
.tag-top{background:#FFE8BA;color:#B87A00}
.nav-icon{width:16px;height:16px;flex-shrink:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#C9CDD4;border-radius:3px}
</style>
</head>
<body>

<div id="app"></div>

<script>
// === Mock Data ===
const SCENE_ITEMS = ['splash','interstitial','feed','search'];
const SCENE_NAMES = {splash:'开屏',interstitial:'插屏',feed:'信息流',search:'搜索'};
const PLATFORM_NAMES = {android:'Android',ios:'iOS'};
const DSP_SOURCE_NAMES = {pangle:'穿山甲',gdt:'优量汇',ks:'快手联盟',baidu:'百度联盟',sigmob:'Sigmob',mintegral:'Mintegral'};
const DSP_SOURCES = ['pangle','gdt','ks','baidu','sigmob','mintegral'];

// Generate mock groups for each scene+platform combination
const SLOT_IDS = {splash:['1000','1005'],interstitial:['1001','1006'],feed:['1002','1007'],search:['1003','1008']};
const SLOT_NAMES = {'1000':'美柚--开屏','1005':'美柚--开屏(iOS)','1001':'美柚--插屏','1006':'美柚--插屏(iOS)','1002':'美柚--信息流','1007':'美柚--信息流(iOS)','1003':'美柚--搜索','1008':'美柚--搜索(iOS)'};

let groupIdCounter = 100;
let sourceIdCounter = 1000;

function createMockSources(count, scene, platform) {
  const sources = [];
  const dspList = [...DSP_SOURCES];
  for (let i = 0; i < count && dspList.length > 0; i++) {
    const idx = Math.floor(Math.random() * dspList.length);
    const dsp = dspList.splice(idx, 1)[0];
    sources.push({
      id: `src-${sourceIdCounter++}`,
      name: DSP_SOURCE_NAMES[dsp],
      dspSources: [dsp],
      pricingType: 'bidding',
      price: Math.round(Math.random() * 30 + 5),
      priceA: Math.round(Math.random() * 25 + 8),
      priceB: Math.round(Math.random() * 35 + 3),
      status: i < 3 ? 'enabled' : 'disabled',
      isDefault: i === 0,
      slotId: SLOT_IDS[scene][platform === 'ios' ? 1 : 0],
      estimatedRevenue: Math.round(Math.random() * 5000 + 100),
      revenuePerThousand: Math.round(Math.random() * 20 + 5),
      ecpm: Math.round(Math.random() * 30 + 10),
      thousandRequestValue: Math.round(Math.random() * 15 + 3),
      requests: Math.round(Math.random() * 50000 + 1000),
      responseRate: Math.round(Math.random() * 30 + 60),
      bidWins: Math.round(Math.random() * 2000 + 100),
      bidWinRate: Math.round(Math.random() * 15 + 10),
      impressions: Math.round(Math.random() * 5000 + 500),
      winImpressionRate: Math.round(Math.random() * 20 + 40),
      ctr: Math.round(Math.random() * 8 + 2),
      cpc: Math.round(Math.random() * 3 + 0.5)
    });
  }
  if (sources.length > 0) sources[0].isDefault = true;
  return sources;
}

function generateGroups() {
  const groups = [];
  for (const scene of SCENE_ITEMS) {
    for (const platform of ['android','ios']) {
      const groupId = `group-${groupIdCounter++}`;
      groups.push({
        id: groupId,
        name: `${SCENE_NAMES[scene]}-${PLATFORM_NAMES[platform]}-默认分组`,
        scene, platform,
        status: 'enabled',
        priority: 1,
        isDefault: true,
        adSlots: SLOT_IDS[scene],
        slotId: SLOT_IDS[scene][platform === 'ios' ? 1 : 0],
        adSources: createMockSources(4, scene, platform),
        hasABTest: false,
        abTestStarted: false,
        trafficRatio: 50
      });
      // Add a second custom group
      groups.push({
        id: `group-${groupIdCounter++}`,
        name: `${SCENE_NAMES[scene]}-${PLATFORM_NAMES[platform]}-次优分组`,
        scene, platform,
        status: 'enabled',
        priority: 2,
        isDefault: false,
        adSlots: SLOT_IDS[scene],
        slotId: SLOT_IDS[scene][platform === 'ios' ? 1 : 0],
        adSources: createMockSources(2, scene, platform),
        hasABTest: false,
        abTestStarted: false,
        trafficRatio: 30
      });
    }
  }
  // Add a custom mixed group
  groups.push({
    id: `group-${groupIdCounter++}`,
    name: '自定义-高价分组',
    scene: 'feed', platform: 'android',
    status: 'enabled', priority: 3, isDefault: false,
    adSlots: ['1002','1007'],
    slotId: '1002',
    adSources: createMockSources(3, 'feed', 'android'),
    hasABTest: false,
    abTestStarted: false,
    trafficRatio: 20
  });
  return groups;
}

let groups = generateGroups();

// === State ===
let state = {
  page: 'waterfall', // 'waterfall' | 'code-slots'
  scene: 'splash',
  platform: 'android',
  groupId: groups[0].id,
  abGroup: 'B',
  trafficRatio: 50,
  collapsedDisabled: true,
  codeSlotPage: 1,
  codeSlotPageSize: 10
};

// === Code Slot Mock Data ===
let codeSlots = [];
function initCodeSlots() {
  if (codeSlots.length > 0) return;
  for (let i = 0; i < 30; i++) {
    const platform = Math.random() > 0.5 ? 'android' : 'ios';
    const scene = SCENE_ITEMS[Math.floor(Math.random() * SCENE_ITEMS.length)];
    const slotId = SLOT_IDS[scene][platform === 'ios' ? 1 : 0];
    const boundGroup = groups.filter(g => g.scene === scene && g.platform === platform);
    codeSlots.push({
      id: `CS${String(100000 + i)}`,
      platform,
      scene,
      slotId,
      slotName: SLOT_NAMES[slotId],
      boundGroupName: boundGroup.length > 0 ? boundGroup[0].name : '-',
      boundGroupId: boundGroup.length > 0 ? boundGroup[0].id : '',
      status: Math.random() > 0.2 ? 'active' : 'closed'
    });
  }
}
initCodeSlots();

// === Helper Functions ===
function getCurrentGroup() {
  return groups.find(g => g.id === state.groupId);
}

function getSelectedGroup() {
  const g = groups.filter(g => g.scene === state.scene && g.platform === state.platform);
  return g.find(gg => gg.id === state.groupId) || g[0];
}

function formatNumber(n) {
  if (!n && n !== 0) return '-';
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  return n.toLocaleString();
}

function formatPrice(p) {
  if (!p && p !== 0) return '-';
  return '¥' + p.toFixed ? p.toFixed(2) : Number(p).toFixed(2);
}

function getSourceDisplayName(source) {
  return DSP_SOURCE_NAMES[source.dspSources?.[0]] || source.dspSources?.[0] || source.name;
}

function getPrice(source) {
  if (state.abGroup === 'A') return source.priceA ?? source.price;
  if (state.abGroup === 'B') return source.priceB ?? source.price;
  return source.price;
}

function getSelectedGroup() {
  return groups.find(g => g.id === state.groupId) || null;
}
// === Render Function ===
function render() {
  const app = document.getElementById('app');
  const filteredGroups = groups.filter(g => g.scene === state.scene && g.platform === state.platform);
  if (filteredGroups.length > 0 && !filteredGroups.find(g => g.id === state.groupId)) {
    state.groupId = filteredGroups[0].id;
  }
  const group = getSelectedGroup();
  const enabledSources = group?.adSources.filter(s => s.status === 'enabled') || [];
  const disabledSources = group?.adSources.filter(s => s.status !== 'enabled') || [];

  const showWaterfall = state.page === 'waterfall';
  let html = '<div class="layout">';

  // === Sidebar ===
  html += '<div class="sidebar">';
  html += '<div class="sidebar-header"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#FF4D88" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>美柚广告系统</div>';
  html += '<div class="sidebar-menu">';
  html += `<div class="sidebar-item ${state.page === 'waterfall' ? 'active' : ''}" onclick="switchPage('waterfall')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#4E5969" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>ADX流量工具</div>`;
  html += `<div style="padding-left:16px">`;
  html += `<div class="sidebar-item ${state.page === 'waterfall' ? 'active' : ''}" onclick="switchPage('waterfall')" style="font-size:13px">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#4E5969" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M9 3v18"/></svg>流量分组管理</div>`;
  html += '</div></div></div>';

  // === Main Content ===
  html += '<div class="main">';

  if (showWaterfall) {
    // === Top Bar ===
    html += '<div class="top-bar">';
    html += '<div class="breadcrumb">ADX流量工具 › <span>流量分组管理</span></div>';
    html += '</div>';
    html += '<div class="content">';

    // === Scene Tabs ===
    html += '<div class="filter-bar">';
    html += '<div class="scene-tabs">';
    for (const s of SCENE_ITEMS) {
      html += `<div class="scene-tab ${state.scene === s ? 'active' : ''}" onclick="setScene('${s}')">${SCENE_NAMES[s]}</div>`;
    }
    html += '</div>';

    // === Platform Tabs ===
    html += '<div class="platform-tabs">';
    html += `<div class="platform-tab ${state.platform === 'android' ? 'active' : ''}" onclick="setPlatform('android')">全部</div>`;
    html += `<div class="platform-tab ${state.platform === 'android' ? 'active' : ''}" onclick="setPlatform('android')">Android</div>`;
    html += `<div class="platform-tab ${state.platform === 'ios' ? 'active' : ''}" onclick="setPlatform('ios')">iOS</div>`;
    html += '</div>';
    html += '</div>';

    // === Group Tabs ===
    if (filteredGroups.length > 0) {
      html += '<div class="group-tabs">';
      for (const g of filteredGroups) {
        const isActive = g.id === state.groupId;
        html += `<div class="group-tab ${isActive ? 'active' : ''}" onclick="selectGroup('${g.id}')">${g.name}`;
        if (g.isDefault) html += '<span class="tag tag-default">默认</span>';
        if (g.hasABTest) html += '<span class="tag tag-ab-testing">A/B测试中</span>';
        if (!g.isDefault) html += `<span class="close-btn" onclick="event.stopPropagation();deleteGroup('${g.id}')">×</span>`;
        html += '</div>';
      }
      html += '<button class="btn-secondary" style="padding:4px 12px;font-size:12px;margin-left:4px" onclick="showAddGroup()">+ 添加分组</button>';
      html += '</div>';

      // === A/B Test Bar ===
      if (group?.hasABTest) {
        html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:8px 12px;background:#FFF0F5;border-radius:8px;font-size:13px">';
        html += '<span style="font-weight:500">A/B实验:</span>';
        html += `<button class="btn-secondary ${state.abGroup === 'A' ? 'active' : ''}" onclick="setABGroup('A')" style="padding:2px 10px;font-size:12px">对照组A</button>`;
        html += `<button class="btn-secondary ${state.abGroup === 'B' ? 'active' : ''}" onclick="setABGroup('B')" style="padding:2px 10px;font-size:12px">测试组B</button>`;
        html += `<span style="color:#86909C">流量分配: A组 ${100 - state.trafficRatio}% / B组 ${state.trafficRatio}%</span>`;
        html += `<button class="btn-secondary" style="padding:2px 10px;font-size:12px" onclick="showAbTestConfig()">编辑配置</button>`;
        html += '</div>';
      } else {
        html += '<div style="margin-bottom:12px">';
        html += `<button class="btn-primary" style="padding:6px 14px;font-size:12px" onclick="createABTest()">+ 创建A/B测试</button>`;
        html += '</div>';
      }

      // === Source Table ===
      html += renderSourceTable(enabledSources, disabledSources, group);
    }

    html += '</div>'; // content
  } else {
    // === Code Slots Page ===
    html += '<div class="top-bar">';
    html += '<div class="breadcrumb">ADX流量工具 › <span>代码位ID管理</span></div>';
    html += '</div>';
    html += '<div class="content">';
    html += renderCodeSlotsPage();
    html += '</div>';
  }

  html += '</div>'; // main
  html += '</div>'; // layout

  app.innerHTML = html;
}

// === Render Source Table ===
function renderSourceTable(enabledSources, disabledSources, group) {
  let h = '';

  // Summary row calculation
  function sum(arr, key) { return arr.reduce((s, src) => s + (src[key] || 0), 0); }
  function avg(arr, key) { return arr.length > 0 ? sum(arr, key) / arr.length : 0; }

  const summary = {
    estimatedRevenue: sum(enabledSources, 'estimatedRevenue'),
    revenuePerThousand: avg(enabledSources, 'revenuePerThousand'),
    ecpm: avg(enabledSources, 'ecpm'),
    thousandRequestValue: avg(enabledSources, 'thousandRequestValue'),
    requests: sum(enabledSources, 'requests'),
    responseRate: enabledSources.length > 0 ? sum(enabledSources, 'responseRate') / enabledSources.length : 0,
    bidWins: sum(enabledSources, 'bidWins'),
    bidWinRate: enabledSources.length > 0 ? sum(enabledSources, 'bidWinRate') / enabledSources.length : 0,
    impressions: sum(enabledSources, 'impressions'),
    winImpressionRate: enabledSources.length > 0 ? sum(enabledSources, 'winImpressionRate') / enabledSources.length : 0,
    ctr: enabledSources.length > 0 ? sum(enabledSources, 'ctr') / enabledSources.length : 0,
    cpc: enabledSources.length > 0 ? sum(enabledSources, 'cpc') / enabledSources.length : 0
  };

  function renderSourceRow(source, isSummary) {
    const price = isSummary ? '-' : getPrice(source);
    return `<tr>
      <td>${isSummary ? '' : '<input type="checkbox" style="cursor:pointer">'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px" ${isSummary ? '' : `onmouseenter="showHoverCard(event,'${source.id}')" onmouseleave="hideHoverCard()"`}>
          <span style="width:8px;height:8px;border-radius:50%;background:${isSummary ? '#FF4D88' : ['#FF4D88','#165DFF','#00A870','#FF8A00','#7B61FF','#FF375F'][Math.floor(Math.random()*6)]};display:inline-block"></span>
          <span style="color:#1D2129;font-weight:${isSummary?'500':'400'}">${isSummary ? enabledSources.length + '个DSP来源已启用' : getSourceDisplayName(source)}</span>
          ${!isSummary && source.isDefault ? '<span class="tag tag-default">兜底</span>' : ''}
        </div>
      </td>
      <td>${isSummary ? '' : `<label class="switch"><input type="checkbox" ${source.status === 'enabled' ? 'checked' : ''} onchange="toggleSourceStatus('${source.id}')"><span class="slider"></span></label>`}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge-bidding">竞价</span>
          <span style="color:#1D2129;font-weight:500">${isSummary ? '-' : formatPrice(price)}</span>
          ${isSummary ? '' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#165DFF" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>'}
        </div>
      </td>
      <td style="color:#1D2129">${isSummary ? formatPrice(summary.estimatedRevenue) : formatPrice(source.estimatedRevenue)}</td>
      <td style="color:#1D2129">${isSummary ? formatPrice(summary.revenuePerThousand) : formatPrice(source.revenuePerThousand)}</td>
      <td style="color:#1D2129">${isSummary ? formatPrice(summary.ecpm) : formatPrice(source.ecpm)}</td>
      <td style="color:#1D2129">${isSummary ? formatPrice(summary.thousandRequestValue) : formatPrice(source.thousandRequestValue)}</td>
      <td style="color:#1D2129">${isSummary ? formatNumber(summary.requests) : formatNumber(source.requests)}</td>
      <td style="color:#1D2129">${isSummary ? summary.responseRate.toFixed(1) + '%' : (source.responseRate || 0).toFixed(1) + '%'}</td>
      <td style="color:#1D2129">${isSummary ? formatNumber(summary.bidWins) : formatNumber(source.bidWins)}</td>
      <td style="color:#1D2129">${isSummary ? summary.bidWinRate.toFixed(1) + '%' : (source.bidWinRate || 0).toFixed(1) + '%'}</td>
      <td style="color:#1D2129">${isSummary ? (summary.impressions > 0 ? formatNumber(summary.impressions) : '-') : (source.impressions > 0 ? formatNumber(source.impressions) : '-')}</td>
      <td style="color:#1D2129">${isSummary ? (summary.winImpressionRate > 0 ? summary.winImpressionRate.toFixed(1) + '%' : '-') : (source.winImpressionRate > 0 ? source.winImpressionRate.toFixed(1) + '%' : '-')}</td>
      <td style="color:#1D2129">${isSummary ? (summary.ctr > 0 ? summary.ctr.toFixed(1) + '%' : '-') : (source.ctr > 0 ? source.ctr.toFixed(1) + '%' : '-')}</td>
      <td style="color:#1D2129">${isSummary ? (summary.cpc > 0 ? formatPrice(summary.cpc) : '-') : (source.cpc > 0 ? formatPrice(source.cpc) : '-')}</td>
    </tr>`;
  }

  // Table
  h += '<div style="background:#fff;border-radius:8px;overflow:auto">';
  h += '<table><thead><tr>';
  h += '<th style="width:32px"><input type="checkbox"></th>';
  h += '<th style="min-width:160px">DSP来源</th>';
  h += '<th style="width:64px">状态</th>';
  h += '<th style="width:100px">价格<span class="info-icon" onmouseenter="showTooltip(event,\'图片和视频价格相同\')" onmouseleave="hideTooltip()">?<span class="tooltip">图片和视频价格相同</span></span></th>';
  h += '<th style="width:90px">预估收入(元)<span class="info-icon" onmouseenter="showTooltip(event,\'预估产生的总收入\')" onmouseleave="hideTooltip()">?<span class="tooltip">预估产生的总收入</span></span></th>';
  h += '<th style="width:90px">千人均收益<span class="info-icon" onmouseenter="showTooltip(event,\'每千人产生的收益\')" onmouseleave="hideTooltip()">?<span class="tooltip">每千人产生的收益</span></span></th>';
  h += '<th style="width:90px">eCPM(元)<span class="info-icon" onmouseenter="showTooltip(event,\'千次展示收益\')" onmouseleave="hideTooltip()">?<span class="tooltip">千次展示收益</span></span></th>';
  h += '<th style="width:100px">千次请求价值<span class="info-icon" onmouseenter="showTooltip(event,\'每千次请求产生的价值\')" onmouseleave="hideTooltip()">?<span class="tooltip">每千次请求产生的价值</span></span></th>';
  h += '<th style="width:80px">请求量</th>';
  h += '<th style="width:80px">返回率<span class="info-icon" onmouseenter="showTooltip(event,\'返回量/请求量\')" onmouseleave="hideTooltip()">?<span class="tooltip">返回量/请求量</span></span></th>';
  h += '<th style="width:90px">竞价成功数</th>';
  h += '<th style="width:90px">竞价成功率<span class="info-icon" onmouseenter="showTooltip(event,\'竞价成功数/请求量\')" onmouseleave="hideTooltip()">?<span class="tooltip">竞价成功数/请求量</span></span></th>';
  h += '<th style="width:80px">展示量</th>';
  h += '<th style="width:90px">竞胜展示率</th>';
  h += '<th style="width:80px">点击率</th>';
  h += '<th style="width:80px">cpc<span class="info-icon" onmouseenter="showTooltip(event,\'每次点击成本\')" onmouseleave="hideTooltip()">?<span class="tooltip">每次点击成本</span></span></th>';
  h += '</tr></thead><tbody>';

  // Summary row
  if (enabledSources.length > 0) {
    h += renderSourceRow({}, true);
  }

  // Enabled sources
  for (const src of enabledSources) {
    h += renderSourceRow(src, false);
  }

  h += '</tbody></table>';
  h += '</div>';

  // Disabled sources section
  if (disabledSources.length > 0) {
    h += `<div style="margin-top:16px;background:#fff;border-radius:8px;overflow:hidden">`;
    h += `<div style="padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#4E5969;border-bottom:1px solid #E5E6EB" onclick="toggleCollapsed()">`;
    h += `<svg style="transform:rotate(${state.collapsedDisabled ? 0 : 90}deg);transition:.2s" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4E5969" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
    h += `已关闭 (${disabledSources.length})`;
    h += '</div>';
    if (!state.collapsedDisabled) {
      h += '<table><thead><tr>';
      h += '<th style="width:32px"></th><th style="min-width:160px">DSP来源</th><th style="width:64px">状态</th>';
      for (let i = 0; i < 13; i++) h += '<th></th>';
      h += '</tr></thead><tbody>';
      for (const src of disabledSources) {
        h += renderSourceRow(src, false);
      }
      h += '</tbody></table>';
    }
    h += '</div>';
  }

  return h;
}

// === Render Code Slots Page ===
function renderCodeSlotsPage() {
  const total = codeSlots.length;
  const totalPages = Math.ceil(total / state.codeSlotPageSize);
  const start = (state.codeSlotPage - 1) * state.codeSlotPageSize;
  const pageItems = codeSlots.slice(start, start + state.codeSlotPageSize);

  let h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  h += '<h2 style="font-size:16px;font-weight:600">代码位ID管理</h2>';
  h += '<button class="btn-primary" onclick="showAddCodeSlot()">+ 新增代码位</button>';
  h += '</div>';

  h += '<div style="background:#fff;border-radius:8px;overflow:auto">';
  h += '<table><thead><tr>';
  h += '<th>代码位Id</th><th>系统平台</th><th>广告场景</th><th>广告位</th><th>绑定分组信息</th><th style="width:120px">操作</th>';
  h += '</tr></thead><tbody>';
  for (const cs of pageItems) {
    h += '<tr>';
    h += `<td style="color:#1D2129;font-family:monospace">${cs.id}</td>`;
    h += `<td><span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;background:${cs.platform === 'android' ? '#E8F3FF' : '#F0E8FF'};color:${cs.platform === 'android' ? '#165DFF' : '#7B61FF'}">${PLATFORM_NAMES[cs.platform]}</span></td>`;
    h += `<td>${SCENE_NAMES[cs.scene]}</td>`;
    h += `<td>${cs.slotName}</td>`;
    h += `<td>${cs.boundGroupName}</td>`;
    h += '<td>';
    if (cs.status === 'active') {
      h += `<button style="padding:2px 8px;border:1px solid #FF4D88;border-radius:4px;background:#fff;color:#FF4D88;font-size:12px;cursor:pointer" onclick="toggleCodeSlot('${cs.id}')">× 关闭广告代码位Id</button>`;
    } else {
      h += '<span style="color:#86909C;font-size:12px">已关闭</span>';
    }
    h += '</td></tr>';
  }
  h += '</tbody></table></div>';

  // Pagination
  h += '<div class="pagination">';
  h += `<button ${state.codeSlotPage === 1 ? 'disabled' : ''} onclick="goCodeSlotPage(1)">首页</button>`;
  h += `<button ${state.codeSlotPage === 1 ? 'disabled' : ''} onclick="goCodeSlotPage(${state.codeSlotPage - 1})">‹</button>`;
  for (let i = Math.max(1, state.codeSlotPage - 2); i <= Math.min(totalPages, state.codeSlotPage + 2); i++) {
    h += `<button class="${i === state.codeSlotPage ? 'active' : ''}" onclick="goCodeSlotPage(${i})">${i}</button>`;
  }
  h += `<button ${state.codeSlotPage >= totalPages ? 'disabled' : ''} onclick="goCodeSlotPage(${state.codeSlotPage + 1})">›</button>`;
  h += `<button ${state.codeSlotPage >= totalPages ? 'disabled' : ''} onclick="goCodeSlotPage(${totalPages})">末页</button>`;
  h += `<span style="margin-left:12px;font-size:12px;color:#86909C">每页 ${state.codeSlotPageSize} 条，共 ${total} 条</span>`;
  h += '</div>';

  return h;
}

// === Group Management ===
function showAddGroup() {
  const group = getSelectedGroup();
  if (!group) return;
  showDialog('addGroup', {
    scene: state.scene,
    platform: state.platform,
    sceneName: SCENE_NAMES[state.scene],
    platformName: PLATFORM_NAMES[state.platform]
  });
}

function confirmAddGroup() {
  const name = document.getElementById('newGroupName')?.value?.trim();
  if (!name) { alert('请输入分组名称'); return; }
  const newGroup = {
    id: 'group-' + (groupIdCounter++),
    name,
    scene: state.scene,
    platform: state.platform,
    status: 'enabled',
    priority: groups.filter(g => g.scene === state.scene && g.platform === state.platform).length + 1,
    isDefault: false,
    adSlots: SLOT_IDS[state.scene],
    slotId: SLOT_IDS[state.scene][state.platform === 'ios' ? 1 : 0],
    adSources: [],
    hasABTest: false,
    abTestStarted: false,
    trafficRatio: 10
  };
  groups.push(newGroup);
  state.groupId = newGroup.id;
  closeDialog();
}

function editGroup(id) {
  const group = groups.find(g => g.id === id);
  if (!group) return;
  showDialog('editGroup', group);
}

function confirmEditGroup() {
  const id = document.getElementById('editGroupId').textContent;
  const group = groups.find(g => g.id === id);
  if (!group) return;
  group.name = document.getElementById('editGroupName').value;
  group.status = document.getElementById('editGroupStatus').value;
  saveDb();
  closeDialog();
}

function deleteGroup(id) {
  if (!confirm('确认删除该分组？')) return;
  groups = groups.filter(g => g.id !== id);
  if (state.groupId === id) {
    const filtered = groups.filter(g => g.scene === state.scene && g.platform === state.platform);
    state.groupId = filtered.length > 0 ? filtered[0].id : '';
  }
  render();
}

// === Code Slot Management ===
function showAddCodeSlot() {
  showDialog('addCodeSlot', null);
}

function confirmAddCodeSlot() {
  const csId = document.getElementById('csId')?.value?.trim();
  const platform = document.getElementById('csPlatform')?.value;
  const scene = document.getElementById('csScene')?.value;
  if (!csId) { alert('请输入代码位Id'); return; }
  const slotIds = SLOT_IDS[scene];
  const slotId = slotIds[platform === 'ios' ? 1 : 0];
  const boundGroup = groups.filter(g => g.scene === scene && g.platform === platform);
  codeSlots.push({
    id: csId,
    platform,
    scene,
    slotId,
    slotName: SLOT_NAMES[slotId] || '-',
    boundGroupName: boundGroup.length > 0 ? boundGroup[0].name : '-',
    boundGroupId: boundGroup.length > 0 ? boundGroup[0].id : '',
    status: 'active'
  });
  closeDialog();
}

function toggleCodeSlot(id) {
  const cs = codeSlots.find(s => s.id === id);
  if (!cs) return;
  if (cs.status === 'active') {
    if (!confirm('确认关闭该代码位？')) return;
    cs.status = 'closed';
  } else {
    cs.status = 'active';
  }
  render();
}

function goCodeSlotPage(page) {
  state.codeSlotPage = page;
  render();
}

}

  render();
}

  const overlay = document.getElementById('dialogOverlay');

// === Hover Card ===
function showHoverCard(event, sourceId) {
  const group = getSelectedGroup();
  if (!group) return;
  const src = group.adSources.find(s => s.id === sourceId);
  if (!src) return;
  const card = document.getElementById('hoverCard');
  if (!card) return;
  card.style.display = 'block';
  card.style.left = (event.clientX + 15) + 'px';
  card.style.top = (event.clientY - 10) + 'px';
  card.innerHTML = `
    <div style="font-weight:600;font-size:14px;margin-bottom:12px;color:#1D2129">${getSourceDisplayName(src)}</div>
    <div style="font-size:12px;line-height:1.8;color:#4E5969">

      <div>eCPM: ${formatPrice(src.ecpm)}</div>
      <div>请求量: ${formatNumber(src.requests)}</div>
      <div>返回率: ${(src.responseRate || 0).toFixed(1)}%</div>
      <div>竞胜率: ${(src.bidWinRate || 0).toFixed(1)}%</div>

// === Tooltip ===
let tooltipTimer;

function showTooltip(event, text) {
  const el = event.currentTarget.querySelector('.tooltip');
  if (el) {
    el.style.display = 'block';
    el.textContent = text;
  }
}

function hideTooltip(event) {
  const el = event?.currentTarget?.querySelector('.tooltip');
  if (el) el.style.display = 'none';
  document.querySelectorAll('.info-icon .tooltip').forEach(t => t.style.display = 'none');
}

// === Persistence ===
function saveDb() { /* mock persistence - no-op */ }

// === Init ===
document.addEventListener('DOMContentLoaded', render);
</script>
